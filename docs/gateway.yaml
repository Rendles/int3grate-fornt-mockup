openapi: 3.2.0
info:
  title: Int3grate Gateway API
  version: 0.3.0
  description: |
    Control plane API for Int3grate — B2B AI agent platform.
    Manages identity, agents, chats, approvals, audit, and dashboards.

    Per-version changes are listed in [openapi/CHANGELOG.md](./CHANGELOG.md).
    Schemas and operations changed in a given version carry an `x-changelog`
    extension pointing at the changelog entry — searchable via grep.

    Service-to-service `/internal/*` endpoints live in a separate spec at
    [openapi/gateway-internal.yaml](./gateway-internal.yaml); they are not
    served via `/docs` and are not for frontend consumption.
  x-changelog:
    - version: "0.3.0"
      date: "2026-05-03"
      summary: |
        Full UI-control surface. New public endpoints:
        GET /users, GET /users/{userId} (tenant user listing);
        PATCH /agents/{agentId} (metadata update),
        PATCH /agents/{agentId}/status (lifecycle transitions),
        GET /agents/{agentId}/versions (version listing),
        GET /agents/{agentId}/versions/{versionId} (version detail),
        GET /runs (paginated run listing).
        New schemas: AgentVersionList, PatchAgentRequest,
        PatchAgentStatusRequest, UserList. All changes additive.
    - version: "0.2.1"
      date: "2026-05-02"
      summary: |
        Split internal service-to-service surface out into
        gateway-internal.yaml. Five `/internal/*` paths and their
        internal-only schemas (CreateApprovalInternalRequest,
        GrantsSnapshot, AgentVersionRef, ToolGrantCheck,
        OutboxPendingRow, OutboxPendingList) moved verbatim. Shared
        ApprovalRequest schema extracted to shared/approval-request.yaml
        and `$ref`-d from both specs. No public-API behavior change.
    - version: "0.2.0"
      date: "2026-05-02"
      summary: |
        Chat-side approval support (ADR-0011). Polymorphic
        approval_requests (run_id|chat_id), `awaiting_approval` chat
        status, suspended SSE event, ApprovalDecisionAccepted enum
        widened to [queued, recorded]. All changes additive.
    - version: "0.1.0"
      date: "2026-04-21"
      summary: Initial spec.

servers:
  - url: https://stage.api.int3grate.ai
    description: Stage

tags:
  - name: auth
    description: Authentication (JWT password flow)
  - name: users
    description: Current user profile and tenant user management
  - name: agents
    description: Agent configuration and versioning
  - name: grants
    description: Agent tool grants
  - name: runs
    description: Execution audit trail
  - name: chat
    description: Real-time chat sessions with agents (SSE-streamed)
  - name: approvals
    description: Human-in-the-loop approval workflow
  - name: tool-catalog
    description: Tool registry / catalog
  - name: dashboard
    description: Spend analytics and monitoring
  - name: audit
    description: Tenant-scoped agent action timeline
  - name: health
    description: Liveness probe

paths:
  # ── Auth ────────────────────────────────────────────────────

  /auth/login:
    post:
      operationId: login
      summary: Authenticate user and receive JWT
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT issued successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /me:
    get:
      operationId: getMe
      summary: Get current authenticated user profile
      tags: [users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /users:
    get:
      operationId: listUsers
      summary: List users in the caller's tenant
      description: Requires `admin` or `domain_admin` role.
      x-changelog:
        - version: "0.3.0"
          change: "New endpoint — GET /users for tenant user listing."
      tags: [users]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Paginated list of tenant users
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"

  /users/{userId}:
    get:
      operationId: getUser
      summary: Get a single user by ID within the caller's tenant
      description: Requires `admin` or `domain_admin` role.
      x-changelog:
        - version: "0.3.0"
          change: "New endpoint — GET /users/{userId}."
      tags: [users]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/UserId"
      responses:
        "200":
          description: User record
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Agents ──────────────────────────────────────────────────

  /agents:
    get:
      operationId: listAgents
      summary: List agents for the current tenant
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Paginated list of agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentList"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createAgent
      summary: Create a new agent
      description: |
        Requires `admin` or `domain_admin` role. The created agent's
        `tenant_id` and `owner_user_id` are taken from the caller JWT.
      tags: [agents]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "422":
          $ref: "#/components/responses/ValidationError"

  /agents/{agentId}:
    get:
      operationId: getAgent
      summary: Get agent by ID
      description: |
        Includes the embedded `active_version` (if any) and best-effort
        spend / runs-count enrichment from the orchestrator. Enrichment
        failures are swallowed — `total_spend_usd` / `runs_count` are
        omitted when the orchestrator lookup fails.
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    patch:
      operationId: patchAgent
      summary: Update mutable agent metadata
      description: |
        Updates any combination of `name`, `description`, `domain_id`,
        `owner_user_id`. All fields are optional — absent fields are left
        unchanged (true PATCH semantics). At least one field must be provided.
        Requires `admin` or `domain_admin` role.
        Note: `active_version` is not populated in PATCH responses; re-fetch
        via `GET /agents/{agentId}` if the embedded version is needed.
      x-changelog:
        - version: "0.3.0"
          change: "New operation — PATCH /agents/{agentId} for metadata updates."
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchAgentRequest"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /agents/{agentId}/status:
    patch:
      operationId: patchAgentStatus
      summary: Transition agent lifecycle status
      description: |
        Changes the agent's `status`. Valid values: `draft`, `active`,
        `paused`, `archived`. `archived` is terminal — no transitions out.
        Requires `admin` or `domain_admin` role.
      x-changelog:
        - version: "0.3.0"
          change: "New endpoint — PATCH /agents/{agentId}/status."
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PatchAgentStatusRequest"
      responses:
        "200":
          description: Updated agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /agents/{agentId}/versions:
    get:
      operationId: listAgentVersions
      summary: List versions for an agent (newest first)
      x-changelog:
        - version: "0.3.0"
          change: "New operation — GET /agents/{agentId}/versions for version listing."
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Paginated list of agent versions
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentVersionList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    post:
      operationId: createAgentVersion
      summary: Create a new immutable version for an agent
      description: Requires `admin` or `domain_admin` role.
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentVersionRequest"
      responses:
        "201":
          description: Version created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /agents/{agentId}/versions/{versionId}:
    get:
      operationId: getAgentVersion
      summary: Get a single version by ID
      x-changelog:
        - version: "0.3.0"
          change: "New endpoint — GET /agents/{agentId}/versions/{versionId}."
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Version detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{agentId}/versions/{versionId}/activate:
    post:
      operationId: activateAgentVersion
      summary: Set a version as the active one (deactivates previous)
      description: Requires `admin` or `domain_admin` role.
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Version activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /agents/{agentId}/grants:
    get:
      operationId: listToolGrants
      summary: List tool grants for an agent
      tags: [grants]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Tool grants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolGrant"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: replaceToolGrants
      summary: Replace all tool grants for an agent (full replace)
      description: Requires `admin` or `domain_admin` role.
      tags: [grants]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceToolGrantsRequest"
      responses:
        "200":
          description: Grants replaced
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolGrant"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ── Runs ────────────────────────────────────────────────────

  /runs:
    get:
      operationId: listRuns
      summary: Paginated run listing for the caller's tenant
      description: |
        Proxied to the orchestrator. Optional `?status=` filter narrows the
        result. All statuses returned when the parameter is absent.
      x-changelog:
        - version: "0.3.0"
          change: "New endpoint — GET /runs for tenant-scoped run listing."
      tags: [runs]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RunStatus"
          description: Filter by run status; omitted returns any status.
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Paginated runs list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunsList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /runs/{runId}:
    get:
      operationId: getRun
      summary: Get run with full step timeline (audit view)
      description: |
        Proxied to the orchestrator. The gateway never reads the execution
        schema directly.
      tags: [runs]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Run with steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Chat ───────────────────────────────────────────────────

  /chat:
    post:
      operationId: createChat
      summary: Open a chat session against an agent version
      description: |
        Creates a new chat bound to the given `agent_version_id` and model.
        The chat's model is fixed at creation — to switch models, open a
        new chat. If `model` is omitted, the orchestrator substitutes the
        platform default. Tenant and creating user are resolved from the
        caller's JWT and stamped onto the chat.
      tags: [chat]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatRequest"
      responses:
        "201":
          description: Chat created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /chat/{chatId}:
    get:
      operationId: getChat
      summary: Get chat metadata and running aggregates
      tags: [chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
      responses:
        "200":
          description: Chat detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: closeChat
      summary: Close a chat
      description: |
        Sets `status=closed` and stamps `ended_at`. Messages are retained.
        Chats cannot be reopened — start a new chat to continue the
        conversation.
      tags: [chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
      responses:
        "204":
          description: Chat closed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /chat/{chatId}/message:
    post:
      operationId: sendChatMessage
      summary: Send a user message and stream the assistant turn (SSE)
      x-changelog:
        - version: "0.2.0"
          change: "SSE frame catalog gains `event:\"suspended\"` (emitted when an approval-gated tool stops the turn). Operation now returns `409` if the chat is in `awaiting_approval` status (ADR-0011 Phases 4-7)."
      description: |
        Appends the user message to the chat, runs one LLM turn (with any
        needed tool calls), and streams the result as Server-Sent Events.
        The response `Content-Type` is `text/event-stream`; SSE frames are
        described here in prose because they are not JSON Schema-validated.

        Each frame is a single `data:` line carrying a JSON object. The
        terminal frame on a normal turn is `done`; on a turn that hit an
        approval gate, the terminal frames are `suspended` followed by
        `done`. Possible event kinds: `turn_start`, `text_delta`,
        `tool_call`, `tool_result`, `turn_end`, `suspended`, `done`,
        `error`.

        ```
        data: {"event":"turn_start","message_id":"<uuid>"}

        data: {"event":"text_delta","delta":"Let me search..."}

        data: {"event":"tool_call","tool":"web_search","args":{...}}

        data: {"event":"tool_result","status":"ok","output_ref":{...}}

        data: {"event":"text_delta","delta":"I found 3 matches..."}

        data: {"event":"turn_end","message_id":"<uuid>","cost_usd":0.0034,"tokens_in":1240,"tokens_out":180}

        data: {"event":"done"}
        ```

        Approval-gated tool calls suspend the turn (ADR-0011 / Phase 4).
        The orchestrator persists a partial assistant `chat_messages` row
        carrying the new `approval_id` plus the pending `tool_calls`,
        flips `chats.status` to `awaiting_approval`, and ends the stream
        with:

        ```
        data: {"event":"suspended","approval_id":"<uuid>","tool":"<name>","tool_call_id":"<id>"}

        data: {"event":"done"}
        ```

        After `suspended`, the stream closes; clients should render an
        awaiting-approval state, poll `GET /approvals/{approval_id}` for
        the decision, and then poll
        `GET /chat/{chatId}/messages?after=<last_seen>` to retrieve the
        resumed turn (D11 — SSE re-attach is intentionally out of scope).

        Error frames terminate the stream:

        ```
        data: {"event":"error","kind":"approval_required|tool_error|llm_error","message":"..."}
        ```
      tags: [chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: Server-Sent Events stream (`text/event-stream`)
          content:
            text/event-stream:
              schema:
                type: string
                description: "Newline-delimited `data: <json>\\n\\n` frames."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /chat/{chatId}/messages:
    get:
      operationId: listChatMessages
      summary: Paginated chat message history
      description: |
        Returns the chat's message timeline. Tool-role messages
        (role=`tool`) are included inline so consumers get a complete
        audit trail; UI clients may filter them out for display.
      tags: [chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Paginated message list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /chats:
    get:
      operationId: listChats
      summary: List chats visible to the caller
      description: |
        Members see only chats they created; admins and domain admins see
        all chats within their tenant scope.
      tags: [chat]
      security:
        - bearerAuth: []
      parameters:
        - name: agent_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by agent.
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Paginated chat list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Approvals ───────────────────────────────────────────────

  /approvals:
    get:
      operationId: listApprovals
      summary: List approval requests (filterable by status)
      description: |
        Defaults to `status=pending`. Pass `status=all` to opt out of the
        filter and return any status.
      tags: [approvals]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            type: string
            enum: [pending, approved, rejected, expired, cancelled, all]
            default: pending
          description: |
            Filter by approval status. Pass `all` to remove the filter.
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Approval requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /approvals/{approvalId}:
    get:
      operationId: getApproval
      summary: Get a single approval request by id
      description: |
        Returns one approval scoped to the caller's tenant. Used by the UI to
        render an approval-detail page (or refresh after a decision is made).
      tags: [approvals]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ApprovalId"
      responses:
        "200":
          description: Approval request
          content:
            application/json:
              schema:
                $ref: "./shared/approval-request.yaml"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /approvals/{approvalId}/decision:
    post:
      operationId: decideApproval
      summary: Approve or reject a pending approval request
      description: |
        Persists the decision and enqueues an outbox event. Resume is
        dispatched asynchronously by the gateway outbox dispatcher; clients
        poll `GET /runs/{runId}` for terminal state. Requires `admin` or
        `domain_admin` role.
      tags: [approvals]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ApprovalId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecisionRequest"
      responses:
        "202":
          description: Decision persisted and queued for asynchronous resume.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalDecisionAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Tool Catalog ────────────────────────────────────────────

  /tool-catalog:
    get:
      operationId: listToolCatalog
      summary: List the platform-wide tool catalog
      description: |
        Returns the registry of tools the orchestrator knows how to invoke,
        with each tool's input JSON Schema and default approval mode.
        Seed-driven for MVP — consumers read it, never write.
      tags: [tool-catalog]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tool catalog
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolCatalogList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Dashboard ───────────────────────────────────────────────

  /dashboard/spend:
    get:
      operationId: getDashboardSpend
      summary: Aggregated spend data for dashboards
      description: Proxied to the orchestrator.
      tags: [dashboard]
      security:
        - bearerAuth: []
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [1d, 7d, 30d, 90d]
            default: 7d
          description: Time range
        - name: group_by
          in: query
          required: false
          schema:
            type: string
            enum: [agent, user]
            default: agent
          description: Grouping dimension
      responses:
        "200":
          description: Spend data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendDashboard"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /dashboard/runs:
    get:
      operationId: getDashboardRuns
      summary: Paginated list of runs for dashboards
      description: |
        Returns runs for the caller's tenant. Proxied to the orchestrator.
      tags: [dashboard]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RunStatus"
          description: Filter by run status; omitted returns any status.
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Paginated runs list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunsList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Audit ───────────────────────────────────────────────────

  /audit:
    get:
      operationId: listAudit
      summary: Tenant-scoped timeline of agent step-level actions with cost
      description: |
        Returns audit events for the caller's tenant, enriched with the
        parent run's agent_id (for run-sourced events) and each step's cost
        + tokens. Proxied to the orchestrator. Each event carries exactly
        one of `run_id` (run-sourced) or `chat_id` (chat-sourced); the other
        is null. Chat-sourced events also populate `message_id`. Passing
        both `run_id` and `chat_id` as filters is rejected with 422.
      tags: [audit]
      security:
        - bearerAuth: []
      parameters:
        - name: agent_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by agent.
        - name: run_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: |
            Filter to run-sourced events. Mutually exclusive with chat_id.
        - name: chat_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: |
            Filter to chat-sourced events. Mutually exclusive with run_id.
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Lower bound on step `created_at` (RFC3339, inclusive).
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Upper bound on step `created_at` (RFC3339, inclusive).
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Paginated audit list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ── Health ──────────────────────────────────────────────────

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      tags: [health]
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

# ════════════════════════════════════════════════════════════════
# Components
# ════════════════════════════════════════════════════════════════

components:

  # ── Security Schemes ────────────────────────────────────────

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT issued by `POST /auth/login`.

  # ── Parameters ──────────────────────────────────────────────

  parameters:
    AgentId:
      name: agentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApprovalId:
      name: approvalId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ChatId:
      name: chatId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    UserId:
      name: userId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OffsetParam:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0

  # ── Responses ───────────────────────────────────────────────

  responses:
    BadRequest:
      description: Request body or parameters malformed
      content:
        application/problem+json:
          schema:
            $ref: "./shared/problem.yaml"
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/problem+json:
          schema:
            $ref: "./shared/problem.yaml"
    Forbidden:
      description: Authenticated but not permitted to perform this action
      content:
        application/problem+json:
          schema:
            $ref: "./shared/problem.yaml"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "./shared/problem.yaml"
    Conflict:
      description: Conflict (state transition error)
      content:
        application/problem+json:
          schema:
            $ref: "./shared/problem.yaml"
    ValidationError:
      description: Request validation failed
      content:
        application/problem+json:
          schema:
            $ref: "./shared/problem.yaml"

  # ── Schemas ─────────────────────────────────────────────────

  schemas:

    # ── Auth ──────────────────────────────────────────────────

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginResponse:
      type: object
      required: [token, expires_at]
      properties:
        token:
          type: string
          description: JWT access token.
        expires_at:
          type: string
          format: date-time

    # ── User ──────────────────────────────────────────────────

    User:
      type: object
      required: [id, tenant_id, email, name, role]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        domain_id:
          type: [string, "null"]
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [member, domain_admin, admin]
        approval_level:
          type: integer
          minimum: 1
          maximum: 4
        created_at:
          type: string
          format: date-time

    UserList:
      type: object
      required: [items, total, limit, offset]
      x-changelog:
        - version: "0.3.0"
          change: "New schema — paginated user list response."
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/User"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    # ── Agent ─────────────────────────────────────────────────

    Agent:
      type: object
      required: [id, tenant_id, name, status, active_version, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        domain_id:
          type: [string, "null"]
          format: uuid
        owner_user_id:
          type: [string, "null"]
          format: uuid
        name:
          type: string
        description:
          type: [string, "null"]
        status:
          type: string
          enum: [draft, active, paused, archived]
        active_version:
          oneOf:
            - $ref: "#/components/schemas/AgentVersion"
            - type: "null"
          description: Embedded active version, or null if no active version exists.
        total_spend_usd:
          type: number
          format: double
          description: |
            Total spend (USD) across all runs for this agent. Populated only
            on the detail view (`GET /agents/{agentId}`); omitted on list
            views and when the orchestrator enrichment lookup fails.
        runs_count:
          type: integer
          description: |
            Count of runs for this agent. Populated only on the detail view;
            omitted otherwise. See `total_spend_usd` for the same caveats.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Agent"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    CreateAgentRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        domain_id:
          type: string
          format: uuid
          description: Scope to a domain. Omit for tenant-wide.

    # ── Agent Version ─────────────────────────────────────────

    AgentVersion:
      type: object
      required:
        - id
        - agent_id
        - version
        - instruction_spec
        - memory_scope_config
        - tool_scope_config
        - approval_rules
        - model_chain_config
        - is_active
        - created_at
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        version:
          type: integer
        instruction_spec:
          type: string
          description: Agent system prompt / instructions.
        memory_scope_config:
          type: object
          description: Allowed memory scopes.
          additionalProperties: true
        tool_scope_config:
          type: object
          description: Allowed tools and modes.
          additionalProperties: true
        approval_rules:
          type: object
          additionalProperties: true
        model_chain_config:
          type: object
          additionalProperties: true
        is_active:
          type: boolean
        created_by:
          type: [string, "null"]
          format: uuid
        created_at:
          type: string
          format: date-time

    CreateAgentVersionRequest:
      type: object
      required: [instruction_spec]
      properties:
        instruction_spec:
          type: string
          minLength: 1
        memory_scope_config:
          type: object
          additionalProperties: true
        tool_scope_config:
          type: object
          additionalProperties: true
        approval_rules:
          type: object
          additionalProperties: true
        model_chain_config:
          type: object
          additionalProperties: true

    AgentVersionList:
      type: object
      required: [items, total, limit, offset]
      x-changelog:
        - version: "0.3.0"
          change: "New schema — paginated version list response."
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AgentVersion"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    PatchAgentRequest:
      type: object
      description: |
        All fields are optional. At least one must be provided.
        Absent fields are left unchanged (true PATCH semantics).
      x-changelog:
        - version: "0.3.0"
          change: "New schema — request body for PATCH /agents/{agentId}."
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: [string, "null"]
        domain_id:
          type: [string, "null"]
          format: uuid
        owner_user_id:
          type: [string, "null"]
          format: uuid

    PatchAgentStatusRequest:
      type: object
      required: [status]
      x-changelog:
        - version: "0.3.0"
          change: "New schema — request body for PATCH /agents/{agentId}/status."
      properties:
        status:
          type: string
          enum: [draft, active, paused, archived]

    # ── Tool Grant ────────────────────────────────────────────

    ToolGrant:
      type: object
      required:
        - id
        - scope_type
        - scope_id
        - tool_name
        - mode
        - approval_required
        - config
        - created_at
        - updated_at
      properties:
        id:
          type: string
          format: uuid
        scope_type:
          type: string
          enum: [tenant, domain, agent]
        scope_id:
          type: string
          format: uuid
        tool_name:
          type: string
        mode:
          type: string
          enum: [read, write, read_write]
        approval_required:
          type: boolean
        config:
          type: object
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ReplaceToolGrantsRequest:
      type: object
      required: [grants]
      properties:
        grants:
          type: array
          items:
            type: object
            required: [tool_name, mode]
            properties:
              tool_name:
                type: string
              mode:
                type: string
                enum: [read, write, read_write]
              approval_required:
                type: boolean
                default: false
              config:
                type: object
                additionalProperties: true

    # ── Tool Catalog ──────────────────────────────────────────

    ToolCatalogEntry:
      type: object
      required: [name, description, default_mode, input_schema, created_at, updated_at]
      description: |
        A single platform-wide tool definition. `input_schema` is a JSON
        Schema describing the tool's input payload.
      properties:
        name:
          type: string
        description:
          type: string
        default_mode:
          type: string
          enum: [read_only, requires_approval, denied]
        input_schema:
          type: object
          description: JSON Schema describing the tool's input payload.
          additionalProperties: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ToolCatalogList:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ToolCatalogEntry"

    # ── Run ───────────────────────────────────────────────────

    RunStatus:
      type: string
      enum:
        - pending
        - running
        - suspended
        - completed
        - completed_with_errors
        - failed
        - cancelled
      description: |
        Terminal states: `completed`, `completed_with_errors`, `failed`,
        `cancelled`. `completed` is the "fully clean" terminal — the run
        produced final assistant output and every tool call succeeded.
        `completed_with_errors` is also terminal and runnable tools still
        produced final assistant output, but ≥1 tool call failed (see
        `tool_errors[]`). `failed` means the run did not produce usable
        output (orchestrator error, timeout, etc.).

    RunErrorKind:
      type: string
      enum: [tool_error, orchestrator_error, timeout, cancelled]

    RunToolError:
      type: object
      required: [tool, status, at]
      properties:
        tool:
          type: string
        status:
          type: string
        tool_call_id:
          type: [string, "null"]
        error_kind:
          type: [string, "null"]
        message:
          type: [string, "null"]
        at:
          type: string
          format: date-time

    RunDetail:
      type: object
      required:
        - id
        - tenant_id
        - agent_id
        - status
        - total_cost_usd
        - total_tokens_in
        - total_tokens_out
        - steps
        - created_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        task_id:
          type: [string, "null"]
          format: uuid
          description: Optional per ADR-0003 (task concept deferred).
        agent_id:
          type: string
          format: uuid
        agent_version_id:
          type: [string, "null"]
          format: uuid
        status:
          $ref: "#/components/schemas/RunStatus"
        suspended_stage:
          type: [string, "null"]
        started_at:
          type: [string, "null"]
          format: date-time
        ended_at:
          type: [string, "null"]
          format: date-time
        total_cost_usd:
          type: number
          format: double
        total_tokens_in:
          type: integer
        total_tokens_out:
          type: integer
        error_message:
          type: [string, "null"]
        error_kind:
          oneOf:
            - $ref: "#/components/schemas/RunErrorKind"
            - type: "null"
        tool_errors:
          type: array
          description: |
            Per-tool failures recorded during the run. Populated when
            `status = completed_with_errors`, or `status = failed` with
            `error_kind = tool_error`. Omitted otherwise.
          items:
            $ref: "#/components/schemas/RunToolError"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/RunStep"
        created_at:
          type: string
          format: date-time

    RunsList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RunListItem"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    RunListItem:
      type: object
      required:
        - id
        - tenant_id
        - status
        - total_cost_usd
        - total_tokens_in
        - total_tokens_out
        - created_at
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        task_id:
          type: [string, "null"]
          format: uuid
          description: Optional per ADR-0003.
        agent_id:
          type: [string, "null"]
          format: uuid
        agent_version_id:
          type: [string, "null"]
          format: uuid
        status:
          $ref: "#/components/schemas/RunStatus"
        suspended_stage:
          type: [string, "null"]
        started_at:
          type: [string, "null"]
          format: date-time
        ended_at:
          type: [string, "null"]
          format: date-time
        total_cost_usd:
          type: number
          format: double
        total_tokens_in:
          type: integer
        total_tokens_out:
          type: integer
        created_at:
          type: string
          format: date-time

    RunStep:
      type: object
      required: [id, step_type, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        step_type:
          type: string
          description: |
            llm_call | tool_call | memory_read | memory_write |
            approval_gate | validation. Kept as free-form string because
            run-side values are historically informal.
        status:
          type: string
        model_name:
          type: [string, "null"]
        tool_name:
          type: [string, "null"]
        input_ref:
          description: Free-form JSON payload reference.
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
            - type: "null"
        output_ref:
          description: Free-form JSON payload reference.
          oneOf:
            - type: object
              additionalProperties: true
            - type: array
            - type: "null"
        cost_usd:
          type: [number, "null"]
          format: double
        tokens_in:
          type: [integer, "null"]
        tokens_out:
          type: [integer, "null"]
        duration_ms:
          type: [integer, "null"]
        created_at:
          type: string
          format: date-time
        completed_at:
          type: [string, "null"]
          format: date-time

    # ── Chat ──────────────────────────────────────────────────

    Chat:
      type: object
      x-changelog:
        - version: "0.2.0"
          change: "status enum extended with `awaiting_approval` (ADR-0011 Phase 4)."
      required:
        - id
        - tenant_id
        - agent_id
        - agent_version_id
        - created_by
        - model
        - status
        - started_at
        - updated_at
        - total_cost_usd
        - total_tokens_in
        - total_tokens_out
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        agent_version_id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
          description: User who created the chat.
        model:
          type: string
          description: LLM model id, fixed for the chat's lifetime.
        title:
          type: [string, "null"]
        status:
          type: string
          enum: [active, closed, failed, awaiting_approval]
          description: |
            Lifecycle state of the chat. `awaiting_approval` is set while
            the chat is suspended on a pending approval (the latest
            `chat_messages` row carries the `approval_id`); the chat
            returns to `active` after resume completes. See ADR-0011.
        started_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        ended_at:
          type: [string, "null"]
          format: date-time
        total_cost_usd:
          type: number
          format: double
        total_tokens_in:
          type: integer
        total_tokens_out:
          type: integer

    ChatList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Chat"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    ChatMessage:
      type: object
      required: [id, chat_id, role, created_at]
      properties:
        id:
          type: string
          format: uuid
        chat_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, tool, system]
        content:
          type: [string, "null"]
          description: |
            Free-text payload. Assistant and user turns carry text here;
            pure tool-call turns (role=`assistant` with `tool_calls` set)
            may leave this null.
        tool_calls:
          description: |
            Present on assistant turns that invoked one or more tools.
            Shape mirrors the LLM provider's tool-call schema; treated as
            opaque JSON by the contract.
          oneOf:
            - type: array
              items:
                type: object
                additionalProperties: true
            - type: "null"
        tool_call_id:
          type: [string, "null"]
          description: |
            Set on role=`tool` messages; references the id of the entry in
            the assistant turn's `tool_calls` that this result answers.
        tool_name:
          type: [string, "null"]
          description: Denormalized tool name for audit (role=`tool` messages).
        cost_usd:
          type: [number, "null"]
          format: double
        tokens_in:
          type: [integer, "null"]
        tokens_out:
          type: [integer, "null"]
        created_at:
          type: string
          format: date-time

    ChatMessageList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    CreateChatRequest:
      type: object
      required: [agent_version_id]
      properties:
        agent_version_id:
          type: string
          format: uuid
        model:
          type: [string, "null"]
          description: |
            Model id to bind to the chat. Must be in the
            orchestrator's allowed-model list. Omit to use the platform default.
        title:
          type: [string, "null"]

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    # ── Approval ──────────────────────────────────────────────
    # `ApprovalRequest` (and its `status` enum) live in
    # `shared/approval-request.yaml` — referenced from both this spec and
    # `gateway-internal.yaml`.

    ApprovalList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "./shared/approval-request.yaml"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    ApprovalDecisionRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approved, rejected]
        reason:
          type: string
          description: Optional reason for the decision.

    ApprovalDecisionAccepted:
      type: object
      x-changelog:
        - version: "0.2.0"
          change: "`status` enum widened from `[queued]` to `[queued, recorded]` to distinguish chat-source (queued) from run-source (recorded) decisions (ADR-0011 Phases 6-7)."
      required: [approval_id, decision, status]
      description: |
        202 body returned by `POST /approvals/{approvalId}/decision`. The
        decision is always persisted before this response is returned.
        Whether the gateway also queues an asynchronous resume on the
        outbox depends on the approval's source — see `status`.

        For chat-sourced approvals, clients poll
        `GET /approvals/{approvalId}` for the resolved decision and then
        `GET /chat/{chatId}/messages?after=<last_seen>` to retrieve the
        resumed turn.
      properties:
        approval_id:
          type: string
          format: uuid
        decision:
          type: string
          enum: [approved, rejected]
        status:
          type: string
          enum: [queued, recorded]
          description: |
            * `queued`: the decision was persisted **and** an asynchronous
              resume was enqueued on the gateway outbox. Today this is the
              path used for chat-sourced approvals (the outbox dispatcher
              calls `POST /internal/chats/{chatId}/resume` with bounded
              backoff — see ADR-0011 / Phase 6).
            * `recorded`: the decision was persisted, no async dispatch was
              scheduled. Today this is the path used for run-sourced
              approvals — runs are create+read-only on the wire post-ADR-0011
              / R1, so no resume work is queued. Returned for forward-compat
              with sources that don't need a follow-up dispatch.

    # ── Dashboard ─────────────────────────────────────────────

    SpendDashboard:
      type: object
      required: [range, group_by, total_usd, items]
      properties:
        range:
          type: string
        group_by:
          type: string
        total_usd:
          type: number
          format: double
        items:
          type: array
          items:
            $ref: "#/components/schemas/SpendRow"

    SpendRow:
      type: object
      required: [label, total_usd, total_tokens_in, total_tokens_out, run_count]
      properties:
        id:
          type: string
          description: Agent ID or User ID depending on `group_by`.
        label:
          type: string
          description: Agent name or user name.
        total_usd:
          type: number
          format: double
        total_tokens_in:
          type: integer
        total_tokens_out:
          type: integer
        run_count:
          type: integer
        spend_date:
          type: string
          format: date

    # ── Audit ─────────────────────────────────────────────────

    AuditEvent:
      type: object
      required: [id, agent_id, step_type, status, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: Underlying run_step or chat_message ID.
        run_id:
          type: [string, "null"]
          format: uuid
          description: |
            Set when the event originates from a run step. Mutually exclusive
            with chat_id — exactly one of the two is non-null per event.
        chat_id:
          type: [string, "null"]
          format: uuid
          description: |
            Set when the event originates from a chat turn. Mutually exclusive
            with run_id — exactly one of the two is non-null per event.
        message_id:
          type: [string, "null"]
          format: uuid
          description: |
            Set only for chat-sourced events. References chat_messages.id.
            Always null for run-sourced events.
        agent_id:
          type: string
          format: uuid
        step_type:
          type: string
          description: |
            Run-sourced: llm | tool_call | approval_wait | system.
            Chat-sourced: chat_message | chat_tool_call.
            Kept as free-form string because run-side values are historically informal.
        status:
          type: string
          description: pending | running | completed | failed | cancelled.
        tool_name:
          type: [string, "null"]
        model_name:
          type: [string, "null"]
        cost_usd:
          type: [number, "null"]
          format: double
        tokens_in:
          type: [integer, "null"]
        tokens_out:
          type: [integer, "null"]
        duration_ms:
          type: [integer, "null"]
        created_at:
          type: string
          format: date-time
        completed_at:
          type: [string, "null"]
          format: date-time

    AuditList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    # ── Health ────────────────────────────────────────────────

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
        schema_version:
          type: string
