openapi: 3.1.0
info:
  title: Int3grate Gateway API
  version: 0.0.1
  description: |
    Control plane API for Int3grate — B2B AI agent platform.
    Manages identity, agents, tasks, approvals, and dashboards.
  contact:
    name: Int3grate Team
    email: team.access@sprouter.ai

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: auth
    description: Authentication (JWT password flow)
  - name: users
    description: Current user profile
  - name: agents
    description: Agent configuration and versioning
  - name: tasks
    description: Work items (chat, one-time, schedule)
  - name: runs
    description: Execution audit trail
  - name: chat
    description: Real-time chat sessions with agents (SSE-streamed)
  - name: approvals
    description: Human-in-the-loop approval workflow
  - name: tools
    description: Tool registry / catalog
  - name: dashboard
    description: Spend analytics and monitoring
  - name: internal
    description: Service-to-service endpoints (not publicly routed)

paths:
  # ── Auth ────────────────────────────────────────────────────

  /auth/login:
    post:
      operationId: login
      summary: Authenticate user and receive JWT
      tags: [auth]
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: JWT issued successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/LoginResponse"
          links:
            GetCurrentUser:
              operationId: getMe
              description: |
                After login, clients typically fetch the authenticated
                profile. The link carries no parameters; downstream
                consumers (e.g. state-machine drivers) are expected to
                forward the returned `token` as an `Authorization`
                bearer on the follow-up call.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /me:
    get:
      operationId: getMe
      summary: Get current authenticated user profile
      tags: [users]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Agents ──────────────────────────────────────────────────

  /agents:
    get:
      operationId: listAgents
      summary: List agents for the current tenant
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Paginated list of agents
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentList"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createAgent
      summary: Create a new agent
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentRequest"
      responses:
        "201":
          description: Agent created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
          links:
            GetAgentById:
              operationId: getAgent
              parameters:
                agentId: $response.body#/id
              description: Fetch the newly created agent by ID.
            ReplaceAgentGrants:
              operationId: replaceToolGrants
              parameters:
                agentId: $response.body#/id
              description: Configure tool grants for the new agent.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /agents/{agentId}:
    get:
      operationId: getAgent
      summary: Get agent by ID
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Agent details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Agent"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /agents/{agentId}/versions:
    post:
      operationId: createAgentVersion
      summary: Create a new immutable version for an agent
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateAgentVersionRequest"
      responses:
        "201":
          description: Version created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /agents/{agentId}/versions/{versionId}/activate:
    post:
      operationId: activateAgentVersion
      summary: Set a version as the active one (deactivates previous)
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
        - $ref: "#/components/parameters/VersionId"
      responses:
        "200":
          description: Version activated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentVersion"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /agents/{agentId}/grants:
    get:
      operationId: listToolGrants
      summary: List tool grants for an agent
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Tool grants
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolGrant"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    put:
      operationId: replaceToolGrants
      summary: Replace all tool grants for an agent (full replace)
      tags: [agents]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ReplaceToolGrantsRequest"
      responses:
        "200":
          description: Grants replaced
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolGrant"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ── Tasks ───────────────────────────────────────────────────
  # NOTE: All /tasks/* paths and Task* schemas are deferred from the MVP
  # per ADR-0003. They are kept in the spec for design continuity, but
  # are not implemented in the gateway today and are marked
  # `x-mvp-deferred: true` so codegen / tooling can filter them out.

  /tasks:
    get:
      operationId: listTasks
      summary: "[MVP-DEFERRED] List tasks for the current tenant"
      x-mvp-deferred: true
      tags: [tasks]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/TaskStatus"
      responses:
        "200":
          description: Paginated list of tasks
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/TaskList"
        "401":
          $ref: "#/components/responses/Unauthorized"

    post:
      operationId: createTask
      summary: "[MVP-DEFERRED] Create a new task (starts a run)"
      x-mvp-deferred: true
      tags: [tasks]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/IdempotencyKey"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateTaskRequest"
      responses:
        "201":
          description: Task created, run started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /tasks/{taskId}:
    get:
      operationId: getTask
      summary: "[MVP-DEFERRED] Get task by ID"
      x-mvp-deferred: true
      tags: [tasks]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/TaskId"
      responses:
        "200":
          description: Task details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Task"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Runs ────────────────────────────────────────────────────

  /runs/{runId}:
    get:
      operationId: getRun
      summary: Get run with full step timeline (audit view)
      tags: [runs]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/RunId"
      responses:
        "200":
          description: Run with steps
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunDetail"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  # ── Chat ───────────────────────────────────────────────────

  /chat:
    post:
      operationId: createChat
      summary: Open a chat session against an agent version
      description: |
        Creates a new chat bound to the given `agent_version_id` and model.
        The chat's model is fixed at creation — to switch models, open a
        new chat. If `model` is omitted, the orchestrator substitutes the
        platform default (`ANTHROPIC_DEFAULT_MODEL`). Tenant and creating
        user are resolved from the caller's JWT and stamped onto the chat.
      tags: [chat]
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateChatRequest"
      responses:
        "201":
          description: Chat created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"
          links:
            GetChatById:
              operationId: getChat
              parameters:
                chatId: $response.body#/id
              description: Fetch the newly created chat by ID.
            SendFirstMessage:
              operationId: sendChatMessage
              parameters:
                chatId: $response.body#/id
              description: Send the first user turn and stream the assistant reply.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "422":
          $ref: "#/components/responses/ValidationError"

  /chat/{chatId}:
    get:
      operationId: getChat
      summary: Get chat metadata and running aggregates
      tags: [chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
      responses:
        "200":
          description: Chat detail
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Chat"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

    delete:
      operationId: closeChat
      summary: Close a chat
      description: |
        Sets `status=closed` and stamps `ended_at`. Messages are retained.
        Chats cannot be reopened — start a new chat to continue the
        conversation.
      tags: [chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
      responses:
        "204":
          description: Chat closed
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  /chat/{chatId}/message:
    post:
      operationId: sendChatMessage
      summary: Send a user message and stream the assistant turn (SSE)
      description: |
        Appends the user message to the chat, runs one LLM turn (with any
        needed tool calls), and streams the result as Server-Sent Events.
        The response `Content-Type` is `text/event-stream` and the frame
        shape is documented here in prose — SSE payloads are not JSON
        Schema-validated by schemathesis.

        Each frame is a single `data:` line containing a JSON object:

        ```
        data: {"event":"turn_start","message_id":"<uuid>"}

        data: {"event":"text_delta","delta":"Let me search..."}

        data: {"event":"tool_call","tool":"web_search","args":{...}}

        data: {"event":"tool_result","status":"ok","output_ref":{...}}

        data: {"event":"text_delta","delta":"I found 3 matches..."}

        data: {"event":"turn_end","message_id":"<uuid>","cost_usd":0.0034,"tokens_in":1240,"tokens_out":180}

        data: {"event":"done"}
        ```

        Error frames terminate the stream:

        ```
        data: {"event":"error","kind":"approval_required|tool_error|llm_error","message":"..."}
        ```

        `kind=approval_required` indicates a tool required an approval that
        is not available inside chat (v1) — the turn fails; the caller
        routes the user to the approval surface and retries from a new turn.
      tags: [chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SendMessageRequest"
      responses:
        "200":
          description: Server-Sent Events stream (`text/event-stream`)
          content:
            text/event-stream:
              schema:
                type: string
                description: "Newline-delimited `data: <json>\\n\\n` frames."
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"
        "422":
          $ref: "#/components/responses/ValidationError"

  /chat/{chatId}/messages:
    get:
      operationId: listChatMessages
      summary: Paginated chat message history (newest-first)
      description: |
        Returns the chat's message timeline ordered newest-first. Tool-role
        messages (role=`tool`) are included inline so consumers get a
        complete audit trail; UI clients may filter them out for display.
      tags: [chat]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ChatId"
        - name: limit
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 200
            default: 50
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Paginated message list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatMessageList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /chats:
    get:
      operationId: listChats
      summary: List chats visible to the caller
      description: |
        Members see only chats they created; admins and domain admins see
        all chats within their tenant scope. Ordered newest-first.
      tags: [chat]
      security:
        - bearerAuth: []
      parameters:
        - name: agent_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by agent.
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Paginated chat list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ChatList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Approvals ───────────────────────────────────────────────

  /approvals:
    get:
      operationId: listApprovals
      summary: List approval requests (filterable by status)
      tags: [approvals]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            $ref: "#/components/schemas/ApprovalStatus"
          description: Filter by status (default pending)
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Approval requests
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /approvals/{approvalId}/decision:
    post:
      operationId: decideApproval
      summary: Approve or reject a pending approval request
      description: |
        Persists the decision and enqueues an outbox event. The gateway no
        longer waits for orchestrator resume — resume is dispatched
        asynchronously via the outbox; resume can take 8–15 s (LLM round-trip).
        Clients poll `GET /runs/{runId}` for terminal state. See ADR-0004
        (candidate).
      tags: [approvals]
      security:
        - bearerAuth: []
      parameters:
        - $ref: "#/components/parameters/ApprovalId"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApprovalDecisionRequest"
      responses:
        "200":
          description: |
            Deprecated — will be removed after 2026-07-01 once the gateway
            outbox lands. During the transition the gateway may still return
            `200` synchronously; new clients must accept `202` as the
            canonical success response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRequest"
        "202":
          description: |
            Decision accepted and queued for asynchronous resume via the
            gateway outbox. Canonical success response.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalDecisionAccepted"
        "400":
          $ref: "#/components/responses/BadRequest"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"
        "409":
          $ref: "#/components/responses/Conflict"

  # ── Tools (catalog / registry) ──────────────────────────────

  /tools:
    get:
      operationId: listTools
      summary: List the tool catalog available to agents
      description: |
        Returns the registry of tools the orchestrator knows how to
        invoke, with each tool's input JSON Schema and default approval
        mode. Downstream UIs use this to render tool-picker surfaces;
        downstream clients use it to validate tool inputs before
        dispatch.
      tags: [tools]
      security:
        - bearerAuth: []
      responses:
        "200":
          description: Tool catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ToolDefinition"
              examples:
                web_search:
                  summary: web_search tool entry
                  value:
                    - name: web_search
                      description: Search the public web
                      input_schema:
                        type: object
                        required: [query]
                        properties:
                          query: { type: string, minLength: 1, maxLength: 500 }
                          max_results: { type: integer, minimum: 1, maximum: 10, default: 5 }
                      default_mode: read_only
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Dashboard ───────────────────────────────────────────────

  /dashboard/spend:
    get:
      operationId: getDashboardSpend
      summary: Aggregated spend data for dashboards
      tags: [dashboard]
      security:
        - bearerAuth: []
      parameters:
        - name: range
          in: query
          required: false
          schema:
            type: string
            enum: [1d, 7d, 30d, 90d]
            default: 7d
          description: Time range
        - name: group_by
          in: query
          required: false
          schema:
            type: string
            enum: [agent, user]
            default: agent
          description: Grouping dimension
      responses:
        "200":
          description: Spend data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SpendDashboard"
        "401":
          $ref: "#/components/responses/Unauthorized"

  /dashboard/runs:
    get:
      operationId: getDashboardRuns
      summary: Paginated list of runs for dashboards (filterable by status)
      description: |
        Returns runs for the caller's tenant, ordered newest-first.
        Used by the gateway dashboard list view. The gateway proxies
        to the orchestrator `GET /internal/runs` for the underlying
        execution data.
      tags: [dashboard]
      security:
        - bearerAuth: []
      parameters:
        - name: status
          in: query
          required: false
          schema:
            $ref: "#/components/schemas/RunStatus"
          description: Filter by run status; omitted returns any status.
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Paginated runs list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RunsList"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Audit ───────────────────────────────────────────────────

  /audit:
    get:
      operationId: listAudit
      summary: Tenant-scoped timeline of agent step-level actions with cost
      description: |
        Returns a paginated listing of audit events for the caller's tenant,
        enriched with the parent run's agent_id (for run-sourced events) and
        each step's cost_usd + token usage. Filterable by agent_id, run_id,
        chat_id, and date range. The gateway proxies to orchestrator
        `GET /internal/audit` — execution data is never read directly from
        the control plane.

        Each event carries exactly one of `run_id` (run-sourced) or
        `chat_id` (chat-sourced); the other is null. Chat-sourced events
        also populate `message_id`. Passing both `run_id` and `chat_id`
        as filters is rejected with 422.
      tags: [audit]
      security:
        - bearerAuth: []
      parameters:
        - name: agent_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: Filter by agent.
        - name: run_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: |
            Filter to run-sourced events for one run. Mutually exclusive
            with chat_id (passing both yields 422).
        - name: chat_id
          in: query
          required: false
          schema:
            type: string
            format: uuid
          description: |
            Filter to chat-sourced events for one chat. Mutually exclusive
            with run_id (passing both yields 422).
        - name: from
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Lower bound on step `created_at` (RFC3339, inclusive).
        - name: to
          in: query
          required: false
          schema:
            type: string
            format: date-time
          description: Upper bound on step `created_at` (RFC3339, inclusive).
        - $ref: "#/components/parameters/LimitParam"
        - $ref: "#/components/parameters/OffsetParam"
      responses:
        "200":
          description: Paginated audit list
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuditList"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  # ── Internal (service-to-service) ───────────────────────────

  /internal/approvals:
    post:
      operationId: createApprovalInternal
      summary: Create an approval request (called by orchestrator)
      tags: [internal]
      x-internal: true
      security:
        - bearerToken: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateApprovalInternalRequest"
      responses:
        "201":
          description: Approval request created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ApprovalRequest"
          links:
            DecideApproval:
              operationId: decideApproval
              parameters:
                approvalId: $response.body#/id
              description: |
                Post the human decision on the newly created approval
                request. Minimal link declared here because the public
                surface only exposes `POST /approvals/{approvalId}/decision`
                — there is no public `POST /approvals`; approvals are
                created internally by the orchestrator.
        "401":
          $ref: "#/components/responses/Unauthorized"
        "422":
          $ref: "#/components/responses/ValidationError"

  /internal/agents/{agentId}/grants/snapshot:
    get:
      operationId: getGrantsSnapshotInternal
      summary: Snapshot of all tool grants for an agent (called by orchestrator)
      description: |
        Returns a point-in-time snapshot of the agent's effective tool
        grants. The orchestrator is expected to fetch this once at run
        start and reference it for the lifetime of the run, rather than
        calling `/internal/tool-grants/check` per tool call.
      tags: [internal]
      x-internal: true
      security:
        - bearerToken: []
      parameters:
        - $ref: "#/components/parameters/AgentId"
      responses:
        "200":
          description: Grants snapshot for the agent
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/GrantsSnapshot"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "403":
          $ref: "#/components/responses/Forbidden"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/agent-versions/{versionId}:
    get:
      operationId: getAgentVersionInternal
      summary: Resolve an agent version to its owning agent (called by orchestrator)
      description: |
        Internal endpoint used by the execution plane at run-creation time
        to resolve an `agent_version_id` to its owning `agent_id` plus
        tenant binding. Authenticated via the shared internal bearer token.
        Tenant scoping is enforced via the mandatory `tenant_id` query
        parameter.
      tags: [internal]
      x-internal: true
      security:
        - bearerToken: []
      parameters:
        - $ref: "#/components/parameters/VersionId"
        - name: tenant_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Agent-version reference
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AgentVersionRef"
        "401":
          $ref: "#/components/responses/Unauthorized"
        "404":
          $ref: "#/components/responses/NotFound"

  /internal/tool-grants/check:
    get:
      operationId: checkToolGrantInternal
      summary: Check if a tool grant exists for a scope (called by orchestrator)
      tags: [internal]
      x-internal: true
      security:
        - bearerToken: []
      parameters:
        - name: scope_type
          in: query
          required: true
          schema:
            type: string
            enum: [tenant, domain, agent]
        - name: scope_id
          in: query
          required: true
          schema:
            type: string
            format: uuid
        - name: tool_name
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Grant check result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ToolGrantCheck"
        "401":
          $ref: "#/components/responses/Unauthorized"

  # ── Health ──────────────────────────────────────────────────

  /health:
    get:
      operationId: healthCheck
      summary: Health check
      tags: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"

# ════════════════════════════════════════════════════════════════
# Components
# ════════════════════════════════════════════════════════════════

components:

  # ── Security Schemes ────────────────────────────────────────

  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT issued by POST /auth/login
    bearerToken:
      type: http
      scheme: bearer
      description: Shared service token for /internal/* endpoints

  # ── Parameters ──────────────────────────────────────────────

  parameters:
    AgentId:
      name: agentId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionId:
      name: versionId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    TaskId:
      name: taskId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunId:
      name: runId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ApprovalId:
      name: approvalId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ChatId:
      name: chatId
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: false
      schema:
        type: string
      description: Client-generated unique key for idempotent retries
    LimitParam:
      name: limit
      in: query
      required: false
      schema:
        type: integer
        minimum: 1
        maximum: 100
        default: 20
    OffsetParam:
      name: offset
      in: query
      required: false
      schema:
        type: integer
        minimum: 0
        default: 0

  # ── Responses ───────────────────────────────────────────────

  responses:
    BadRequest:
      description: Request body or parameters malformed
      content:
        application/problem+json:
          schema:
            $ref: "../schemas/shared/problem.yaml"
    Unauthorized:
      description: Authentication required or token invalid
      content:
        application/problem+json:
          schema:
            $ref: "../schemas/shared/problem.yaml"
    Forbidden:
      description: Authenticated but not permitted to perform this action
      content:
        application/problem+json:
          schema:
            $ref: "../schemas/shared/problem.yaml"
    NotFound:
      description: Resource not found
      content:
        application/problem+json:
          schema:
            $ref: "../schemas/shared/problem.yaml"
    Conflict:
      description: Conflict (duplicate idempotency key or state transition error)
      content:
        application/problem+json:
          schema:
            $ref: "../schemas/shared/problem.yaml"
    ValidationError:
      description: Request validation failed
      content:
        application/problem+json:
          schema:
            $ref: "../schemas/shared/problem.yaml"

  # ── Schemas ─────────────────────────────────────────────────

  schemas:

    # ── Auth ──────────────────────────────────────────────────

    LoginRequest:
      type: object
      required: [email, password]
      properties:
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 8

    LoginResponse:
      type: object
      required: [token, expires_at]
      properties:
        token:
          type: string
          description: JWT access token
        expires_at:
          type: string
          format: date-time

    # ── User ──────────────────────────────────────────────────

    User:
      type: object
      required: [id, tenant_id, email, name, role]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        domain_id:
          type: string
          format: uuid
          nullable: true
        email:
          type: string
          format: email
        name:
          type: string
        role:
          type: string
          enum: [member, domain_admin, admin]
        approval_level:
          type: integer
          minimum: 1
          maximum: 4
        created_at:
          type: string
          format: date-time

    # ── Agent ─────────────────────────────────────────────────

    Agent:
      type: object
      required: [id, tenant_id, name, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        domain_id:
          type: string
          format: uuid
          nullable: true
        owner_user_id:
          type: string
          format: uuid
          nullable: true
        name:
          type: string
        description:
          type: string
          nullable: true
        status:
          type: string
          enum: [draft, active, paused, archived]
        active_version:
          $ref: "#/components/schemas/AgentVersion"
          nullable: true
          description: Embedded active version (if exists)
        total_spend_usd:
          type: number
          format: double
          nullable: true
          description: |
            Total spend (USD) across all runs for this agent. Populated only
            on the detail view (`GET /agents/{agentId}`); null on list views
            and if the orchestrator enrichment lookup fails.
        runs_count:
          type: integer
          nullable: true
          description: |
            Count of runs for this agent. Populated only on the detail view;
            null elsewhere. See `total_spend_usd` for the same caveats.
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    AgentList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Agent"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    CreateAgentRequest:
      type: object
      required: [name]
      properties:
        name:
          type: string
          minLength: 1
          maxLength: 200
        description:
          type: string
        domain_id:
          type: string
          format: uuid
          description: Scope to a domain (null = tenant-wide)

    # ── Agent Version ─────────────────────────────────────────

    AgentVersion:
      type: object
      required: [id, agent_id, version, instruction_spec, is_active, created_at]
      properties:
        id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        version:
          type: integer
        instruction_spec:
          type: string
          description: Agent system prompt / instructions
        memory_scope_config:
          type: object
          description: Allowed memory scopes
        tool_scope_config:
          type: object
          description: Allowed tools and modes
        approval_rules:
          type: object
        model_chain_config:
          type: object
        is_active:
          type: boolean
        created_by:
          type: string
          format: uuid
          nullable: true
        created_at:
          type: string
          format: date-time

    AgentVersionRef:
      type: object
      required: [agent_version_id, agent_id, tenant_id, instruction_spec, is_active, created_at]
      properties:
        agent_version_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        instruction_spec:
          type: string
          description: System prompt / instruction text persisted on the agent version. Orchestrator captures this at chat creation so the value at chat start is frozen.
        is_active:
          type: boolean
          description: True if this version is the currently active version of the agent.
        created_at:
          type: string
          format: date-time

    CreateAgentVersionRequest:
      type: object
      required: [instruction_spec]
      properties:
        instruction_spec:
          type: string
          minLength: 1
        memory_scope_config:
          type: object
          default: {}
        tool_scope_config:
          type: object
          default: {}
        approval_rules:
          type: object
          default: {}
        model_chain_config:
          type: object
          default: {}

    # ── Tool Grant ────────────────────────────────────────────

    ToolGrant:
      type: object
      required: [id, tool_name, mode, approval_required]
      properties:
        id:
          type: string
          format: uuid
        scope_type:
          type: string
          enum: [tenant, domain, agent]
        scope_id:
          type: string
          format: uuid
        tool_name:
          type: string
        mode:
          type: string
          enum: [read, write, read_write]
        approval_required:
          type: boolean
        config:
          type: object

    ReplaceToolGrantsRequest:
      type: object
      required: [grants]
      properties:
        grants:
          type: array
          items:
            type: object
            required: [tool_name, mode]
            properties:
              tool_name:
                type: string
              mode:
                type: string
                enum: [read, write, read_write]
              approval_required:
                type: boolean
                default: false
              config:
                type: object
                default: {}

    ToolGrantCheck:
      type: object
      required: [granted, mode, approval_required]
      properties:
        granted:
          type: boolean
        mode:
          type: string
          enum: [read, write, read_write]
          nullable: true
        approval_required:
          type: boolean

    GrantsSnapshot:
      type: object
      required: [agent_id, tenant_id, version, grants, issued_at]
      description: |
        Point-in-time snapshot of the agent's effective tool grants.
        Orchestrator fetches once at run start and references for the
        lifetime of the run.
      properties:
        agent_id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        version:
          type: string
          description: Monotonic counter or hash of the grants set
        grants:
          type: array
          items:
            type: object
            required: [tool_name, mode]
            properties:
              tool_name:
                type: string
                description: Canonical tool identifier (matches tool_name across the rest of the grants surface).
              mode:
                type: string
                enum: [read_only, requires_approval, denied]
              approval_required:
                type: boolean
                default: false
              scopes:
                type: array
                items:
                  type: string
        issued_at:
          type: string
          format: date-time

    # ── Tool catalog ──────────────────────────────────────────
    # Describes tools available to the orchestrator. Gateway exposes
    # this catalog so downstream clients (and the orchestrator registry)
    # can describe a tool's expected input without hard-coding it.

    ToolDefinition:
      type: object
      required: [name, input_schema, default_mode]
      description: |
        Generic tool catalog entry. `input_schema` is a JSON Schema
        describing the tool's input payload. Specific tools (e.g.
        `web_search`) are not modeled as distinct component schemas —
        the `input_schema` carries that shape. See the `examples:` block
        on `GET /tools` for a seed `web_search` entry.
      properties:
        name:
          type: string
        description:
          type: string
        input_schema:
          type: object
          description: JSON Schema describing the tool's input payload
          additionalProperties: true
        default_mode:
          type: string
          enum: [read_only, requires_approval, denied]

    # ── Task ──────────────────────────────────────────────────

    TaskType:
      x-mvp-deferred: true
      type: string
      enum: [chat, one_time, schedule]

    TaskStatus:
      x-mvp-deferred: true
      type: string
      enum: [pending, running, completed, failed, cancelled]

    Task:
      x-mvp-deferred: true
      type: object
      required: [id, tenant_id, type, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        domain_id:
          type: string
          format: uuid
          nullable: true
        type:
          $ref: "#/components/schemas/TaskType"
        status:
          $ref: "#/components/schemas/TaskStatus"
        created_by:
          type: string
          format: uuid
          nullable: true
        assigned_agent_id:
          type: string
          format: uuid
          nullable: true
        assigned_agent_version_id:
          type: string
          format: uuid
          nullable: true
        title:
          type: string
          nullable: true
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    TaskList:
      x-mvp-deferred: true
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Task"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    CreateTaskRequest:
      x-mvp-deferred: true
      type: object
      required: [agent_id, user_input]
      properties:
        agent_id:
          type: string
          format: uuid
          description: Agent to run (uses active version)
        user_input:
          type: string
          minLength: 1
          description: User message (for chat type)
        type:
          $ref: "#/components/schemas/TaskType"
          default: chat
        title:
          type: string
        domain_id:
          type: string
          format: uuid

    # ── Run ───────────────────────────────────────────────────

    RunStatus:
      type: string
      enum:
        - pending
        - running
        - suspended
        - completed
        - completed_with_errors
        - failed
        - cancelled
      description: |
        Terminal states: `completed`, `completed_with_errors`, `failed`,
        `cancelled`. `completed` is the "fully clean" terminal — the run
        produced final assistant output and every tool call succeeded.
        `completed_with_errors` is also terminal and runnable tools still
        produced final assistant output, but ≥1 tool call failed (see
        `tool_errors[]`). `failed` means the run did not produce usable
        output (orchestrator error, timeout, etc.).

    RunErrorKind:
      type: string
      enum: [none, tool_error, orchestrator_error, timeout, cancelled]

    RunToolError:
      type: object
      required: [tool, status]
      properties:
        tool:
          type: string
        status:
          type: string
          enum: [error, timeout, denied]
        message:
          type: string
        at:
          type: string
          format: date-time
        tool_call_id:
          type: string
          format: uuid
          nullable: true

    RunDetail:
      type: object
      required: [id, tenant_id, status, created_at, steps]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        domain_id:
          type: string
          format: uuid
          nullable: true
        task_id:
          type: string
          format: uuid
          nullable: true
          description: Optional per ADR-0003 (task concept deferred).
        agent_version_id:
          type: string
          format: uuid
          nullable: true
        status:
          $ref: "#/components/schemas/RunStatus"
        suspended_stage:
          type: string
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        ended_at:
          type: string
          format: date-time
          nullable: true
        total_cost_usd:
          type: number
          format: double
        total_tokens_in:
          type: integer
        total_tokens_out:
          type: integer
        error_message:
          type: string
          nullable: true
        error_kind:
          $ref: "#/components/schemas/RunErrorKind"
          nullable: true
        tool_errors:
          type: array
          nullable: true
          description: |
            Per-tool failures recorded during the run. Populated when
            `status = completed_with_errors` or `status = failed` with
            `error_kind = tool_error`. Omitted or empty otherwise.
          items:
            $ref: "#/components/schemas/RunToolError"
        steps:
          type: array
          items:
            $ref: "#/components/schemas/RunStep"
        created_at:
          type: string
          format: date-time

    RunsList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RunListItem"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    RunListItem:
      type: object
      required: [id, tenant_id, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        domain_id:
          type: string
          format: uuid
          nullable: true
        task_id:
          type: string
          format: uuid
          nullable: true
          description: Optional per ADR-0003.
        agent_id:
          type: string
          format: uuid
          nullable: true
        agent_version_id:
          type: string
          format: uuid
          nullable: true
        status:
          $ref: "#/components/schemas/RunStatus"
        suspended_stage:
          type: string
          nullable: true
        started_at:
          type: string
          format: date-time
          nullable: true
        ended_at:
          type: string
          format: date-time
          nullable: true
        total_cost_usd:
          type: number
          format: double
        total_tokens_in:
          type: integer
        total_tokens_out:
          type: integer
        created_at:
          type: string
          format: date-time

    RunStep:
      type: object
      required: [id, step_type, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        step_type:
          type: string
          enum: [llm_call, tool_call, memory_read, memory_write, approval_gate, validation]
        status:
          type: string
        model_name:
          type: string
          nullable: true
        tool_name:
          type: string
          nullable: true
        input_ref:
          type: object
          nullable: true
        output_ref:
          type: object
          nullable: true
        cost_usd:
          type: number
          format: double
          nullable: true
        tokens_in:
          type: integer
          nullable: true
        tokens_out:
          type: integer
          nullable: true
        duration_ms:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    # ── Chat ──────────────────────────────────────────────────

    Chat:
      type: object
      required:
        - id
        - tenant_id
        - agent_id
        - agent_version_id
        - model
        - created_by
        - status
        - started_at
        - total_cost_usd
        - total_tokens_in
        - total_tokens_out
      properties:
        id:
          type: string
          format: uuid
        tenant_id:
          type: string
          format: uuid
        agent_id:
          type: string
          format: uuid
        agent_version_id:
          type: string
          format: uuid
        created_by:
          type: string
          format: uuid
          description: User who created the chat.
        model:
          type: string
          description: LLM model id, fixed for the chat's lifetime.
        title:
          type: string
          nullable: true
        status:
          type: string
          enum: [active, closed, failed]
        started_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time
        ended_at:
          type: string
          format: date-time
          nullable: true
        total_cost_usd:
          type: number
          format: double
        total_tokens_in:
          type: integer
        total_tokens_out:
          type: integer

    ChatList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/Chat"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    ChatMessage:
      type: object
      required: [id, chat_id, role, created_at]
      properties:
        id:
          type: string
          format: uuid
        chat_id:
          type: string
          format: uuid
        role:
          type: string
          enum: [user, assistant, tool, system]
        content:
          type: string
          nullable: true
          description: |
            Free-text payload. Assistant and user turns carry text here;
            pure tool-call turns (role=`assistant` with `tool_calls` set)
            may leave this null.
        tool_calls:
          type: array
          nullable: true
          description: |
            Present on assistant turns that invoked one or more tools.
            Shape mirrors the LLM provider's tool-call schema; treated as
            opaque JSON by the contract.
          items:
            type: object
            additionalProperties: true
        tool_call_id:
          type: string
          nullable: true
          description: |
            Set on role=`tool` messages; references the id of the entry in
            the assistant turn's `tool_calls` that this result answers.
        tool_name:
          type: string
          nullable: true
          description: Denormalized tool name for audit (role=`tool` messages).
        cost_usd:
          type: number
          format: double
          nullable: true
        tokens_in:
          type: integer
          nullable: true
        tokens_out:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time

    ChatMessageList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ChatMessage"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    CreateChatRequest:
      type: object
      required: [agent_version_id]
      properties:
        agent_version_id:
          type: string
          format: uuid
        model:
          type: string
          nullable: true
          description: |
            Model id to bind to the chat. Must be in
            `ANTHROPIC_ALLOWED_MODELS`. Omit to use the platform default.
        title:
          type: string
          nullable: true

    SendMessageRequest:
      type: object
      required: [content]
      properties:
        content:
          type: string
          minLength: 1

    # ── Approval ──────────────────────────────────────────────

    ApprovalStatus:
      type: string
      enum: [pending, approved, rejected, expired, cancelled]

    ApprovalRequest:
      type: object
      required: [id, run_id, tenant_id, requested_action, status, created_at]
      properties:
        id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
          nullable: true
          description: Optional per ADR-0003 (task concept deferred).
        tenant_id:
          type: string
          format: uuid
        requested_action:
          type: string
        requested_by:
          type: string
          format: uuid
          nullable: true
        requested_by_name:
          type: string
          nullable: true
        approver_role:
          type: string
          nullable: true
        approver_user_id:
          type: string
          format: uuid
          nullable: true
        status:
          $ref: "#/components/schemas/ApprovalStatus"
        reason:
          type: string
          nullable: true
        evidence_ref:
          type: object
          nullable: true
          description: Payload diff shown to the approver
        expires_at:
          type: string
          format: date-time
          nullable: true
        resolved_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time

    ApprovalList:
      type: object
      required: [items, total]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ApprovalRequest"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    ApprovalDecisionRequest:
      type: object
      required: [decision]
      properties:
        decision:
          type: string
          enum: [approved, rejected]
        reason:
          type: string
          description: Optional reason for the decision

    ApprovalDecisionAccepted:
      type: object
      required: [approval_id, decision, status]
      properties:
        approval_id:
          type: string
          format: uuid
        decision:
          type: string
          enum: [approve, reject]
        status:
          type: string
          enum: [queued]
          description: |
            Decision persisted; resume will be dispatched asynchronously via
            the gateway's outbox. Clients poll GET /runs/{runId} for terminal
            state.

    CreateApprovalInternalRequest:
      type: object
      required: [run_id, tenant_id, requested_action]
      properties:
        run_id:
          type: string
          format: uuid
        task_id:
          type: string
          format: uuid
          nullable: true
          description: Optional per ADR-0003 (task concept deferred).
        tenant_id:
          type: string
          format: uuid
        requested_action:
          type: string
        requested_by:
          type: string
          format: uuid
        reason:
          type: string
        evidence_ref:
          type: object

    # ── Dashboard ─────────────────────────────────────────────

    SpendDashboard:
      type: object
      required: [range, group_by, items, total_usd]
      properties:
        range:
          type: string
        group_by:
          type: string
        items:
          type: array
          items:
            $ref: "#/components/schemas/SpendRow"
        total_usd:
          type: number
          format: double

    SpendRow:
      type: object
      required: [label, total_usd, run_count]
      properties:
        id:
          type: string
          format: uuid
          description: Agent ID or User ID depending on group_by
        label:
          type: string
          description: Agent name or user name
        total_usd:
          type: number
          format: double
        total_tokens_in:
          type: integer
        total_tokens_out:
          type: integer
        run_count:
          type: integer
        spend_date:
          type: string
          format: date
          nullable: true

    # ── Audit ─────────────────────────────────────────────────

    AuditEvent:
      type: object
      required: [id, step_type, status, agent_id, created_at]
      properties:
        id:
          type: string
          format: uuid
          description: Underlying run_step ID.
        run_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Set when the event originates from a run step. Mutually exclusive
            with chat_id — exactly one of the two is non-null per event.
        chat_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Set when the event originates from a chat turn. Mutually exclusive
            with run_id — exactly one of the two is non-null per event.
        message_id:
          type: string
          format: uuid
          nullable: true
          description: |
            Set only for chat-sourced events. References chat_messages.id.
            Always null for run-sourced events.
        agent_id:
          type: string
          format: uuid
        step_type:
          type: string
          description: |
            Run-sourced: llm | tool_call | approval_wait | system.
            Chat-sourced: chat_message | chat_tool_call.
            Kept as free-form string because run-side values are historically informal.
        status:
          type: string
          description: pending | running | completed | failed | cancelled.
        tool_name:
          type: string
          nullable: true
        model_name:
          type: string
          nullable: true
        cost_usd:
          type: number
          format: double
          nullable: true
          description: Per-step spend attribution.
        tokens_in:
          type: integer
          nullable: true
        tokens_out:
          type: integer
          nullable: true
        duration_ms:
          type: integer
          nullable: true
        created_at:
          type: string
          format: date-time
        completed_at:
          type: string
          format: date-time
          nullable: true

    AuditList:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/AuditEvent"
        total:
          type: integer
        limit:
          type: integer
        offset:
          type: integer

    # ── Health ────────────────────────────────────────────────

    HealthResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [ok]
        schema_version:
          type: string
